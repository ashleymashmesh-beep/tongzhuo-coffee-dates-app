name = "tongzhuo-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
# 创建命令: wrangler d1 create tongzhuo-db
[[d1_databases]]
binding = "DB"
database_name = "tongzhuo-db"
database_id = "427cb14f-dbf5-444c-a5aa-72f230afada0"

# CORS 允许的前端域名
[vars]
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,https://tongzhuo.vercel.app"
